<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Terminal</title>

<style>
body {
    background: #000;
    color: #00ff00;
    font-family: Consolas, monospace;
    margin: 0;
    padding: 20px;
}

#terminal {
    white-space: pre-wrap;
    min-height: 90vh;
}

#input-line {
    display: flex;
}

#prompt {
    margin-right: 5px;
}

input {
    background: transparent;
    border: none;
    color: #00ff00;
    font-family: inherit;
    font-size: inherit;
    width: 100%;
    outline: none;
}
</style>
</head>
<body>

<div id="terminal">
Welcome to Terminal Ping

Type:
ping 1.1.1.1

</div>

<div id="input-line">
    <span id="prompt">></span>
    <input id="command" autofocus>
</div>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("command");

input.addEventListener("keydown", async (e) => {

    if (e.key !== "Enter") return;

    const command = input.value.trim();
    input.value = "";

    terminal.textContent += "\n> " + command;

    if (command.startsWith("ping ")) {

        const ip = command.substring(5).trim();

        try {

            const response = await fetch("/ping", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ ip })
            });

            const data = await response.json();

            if (data.alive) {
                terminal.textContent +=
                    `\nReply from ${ip}: time=${data.time}ms`;
            } else {
                terminal.textContent +=
                    `\nRequest timed out.`;
            }

        } catch {
            terminal.textContent +=
                "\nError contacting server.";
        }
    }

    window.scrollTo(0, document.body.scrollHeight);
});
</script>

</body>
</html>
